<!DOCTYPE html>
<html>

<head>

<title>Fitness Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body onload="loadDashboard()">

<div class="sidebar">

<h2>Fitness</h2>

<div class="profile">

<img src="https://randomuser.me/api/portraits/women/44.jpg" class="profile-pic">

<p id="welcome"></p>

</div>

<ul>

<li onclick="showSection('dashboard')">Dashboard</li>
<li onclick="showSection('goals')">Goals</li>
<li onclick="showSection('workout')">Workout</li>
<li onclick="showSection('stats')">Statistics</li>
<li onclick="showSection('profile')">Profile</li>

</ul>

<button onclick="logout()">Logout</button>

</div>

<div class="main">

<h1>Fitness Planning Dashboard</h1>

<!-- DASHBOARD -->

<div id="dashboardSection" class="section">

<div class="cards">

<div class="card">
<h3>Calories Today</h3>
<p id="caloriesToday">0</p>
</div>

<div class="card">
<h3>BMI</h3>
<p id="bmiValue">0</p>
</div>

</div>

<div class="fitness-form">

<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="breakfast" placeholder="Breakfast Calories">
<input id="lunch" placeholder="Lunch Calories">
<input id="dinner" placeholder="Dinner Calories">
<input id="snacks" placeholder="Snacks Calories">

<button onclick="saveFitness()">Save</button>

</div>

<div class="fitness-images">

<img src="https://images.unsplash.com/photo-1518611012118-fab75240fbc9">
<img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b">
<img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1">

</div>

</div>

<!-- GOALS -->

<div id="goalsSection" class="section" style="display:none">

<h2>Your Goals</h2>

<input id="goalWeight" placeholder="Target Weight">

<select id="goalType">

<option>Weight Loss</option>
<option>Muscle Gain</option>
<option>Stay Fit</option>

</select>

<button onclick="saveGoal()">Save Goal</button>

<p id="goalDisplay"></p>

</div>

<!-- WORKOUT -->

<div id="workoutSection" class="section" style="display:none">

<h2>Workout Suggestions</h2>

<ul id="workoutList"></ul>

<div class="workout-gallery">

<img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48">
<img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e">
<img src="https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e">

</div>

</div>

<!-- STATISTICS -->

<div id="statsSection" class="section" style="display:none">

<canvas id="bmiChart"></canvas>

</div>

<!-- PROFILE -->

<div id="profileSection" class="section" style="display:none">

<input id="profileName" placeholder="Name">
<input id="profileAge" placeholder="Age">

<button onclick="saveProfile()">Save</button>

<p id="profileDisplay"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
